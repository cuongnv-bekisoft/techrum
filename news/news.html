<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Aggregator</title>

    <style>
      :root {
        --bg: #f4f4f4;
        --text: #111;
        --card: #ffffff;
        --border: #ddd;
        --hover: #eee;
        --button: #0070f3;
        --button-hover: #005fcc;
      }

      body.dark {
        --bg: #121212;
        --text: #e6e6e6;
        --card: #1e1e1e;
        --border: #333;
        --hover: #2a2a2a;
        --button: #4f9cff;
        --button-hover: #2d7fe6;
      }
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial;
        display: flex;
        height: 100vh;
        background: var(--bg);
        color: var(--text);
        transition: 0.3s;
      }

      button {
        background: var(--button);
        color: white;
        border: 1px solid var(--text);
        cursor: pointer;
        font-weight: bold;
        border-radius: 5px;
      }

      button:hover {
        background: var(--button-hover);
      }

      /* ================= SIDEBAR ================= */

      .sidebar {
        width: 260px;
        overflow-y: auto;
        padding: 10px;
        background: var(--card);
        border-right: 1px solid var(--border);
        transition: 0.3s;
      }

      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .add-btn {
        font-size: 22px;
        cursor: pointer;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
      }

      .source {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
      }

      .source:hover {
        background: var(--hover);
      }
      .source.active {
        background: var(--border);
      }

      .source-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .source img {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }

      .source span {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      /* ================= CONTENT ================= */

      .content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
      }

      .news-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
      }

      .news-item {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        transition: 0.2s;
      }

      .news-item:hover {
        transform: translateY(-3px);
      }

      .news-item img {
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .news-item h4 {
        margin: 8px;
        font-size: 14px;
      }

      .pagination {
        text-align: center;
        margin-top: 20px;
      }

      .loadmore {
        margin-top: 10px;
      }

      /* ================= MODAL ================= */

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal-box {
        background: var(--card);
        padding: 20px;
        border-radius: 8px;
        width: 100%;
        max-width: 400px;
      }

      .modal input {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        z-index: 999;
      }

      .overlay.show {
        display: block;
      }

      /* ===== ITEM OVERLAY ===== */

      .news-item {
        position: relative;
      }

      .item-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        opacity: 0;
        transition: 0.3s;
      }

      .news-item:hover .item-overlay {
        opacity: 1;
      }

      .overlay-btn {
        background: white;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }

      .overlay-btn:hover {
        transform: scale(1.1);
      }

      /* ================= NAVBAR ================= */

      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 3000;
      }

      .nav-left,
      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .nav-left a {
        text-decoration: none;
        color: var(--text);
        font-weight: 500;
      }

      .nav-left a:hover {
        opacity: 0.7;
      }

      .active-link {
        font-weight: bold;
      }

      .logo {
        font-weight: bold;
        font-size: 18px;
      }

      .nav-center {
        display: none;
      }

      .menu-btn {
        display: none;
      }

      body {
        padding-top: 60px;
      }

      .theme-toggle {
        position: absolute;
        right: 50px;
        width: auto;
        padding: 6px 12px;
        font-size: 18px;
        border-radius: 8px;
        margin-top: 0 !important;
      }

      /* ================= TABLET ================= */

      @media (max-width: 1024px) {
        .sidebar {
          width: 200px;
        }

        .news-grid {
          grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }
      }

      /* ================= MOBILE ================= */

      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .sidebar {
          position: fixed;
          left: -260px;
          top: 0;
          height: 100%;
          z-index: 1000;
          box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar.open {
          left: 0;
        }

        .content {
          padding: 15px;
        }

        .news-grid {
          grid-template-columns: 1fr;
        }
        .nav-left a,
        .nav-left .logo {
          display: none;
        }

        .menu-btn {
          display: block;
          background: #0070f3;
          color: white;
          border: none;
          padding: 6px 10px;
          border-radius: 6px;
        }

        .nav-center {
          display: block;
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">
        <button id="menuBtn" class="menu-btn">☰</button>
        <a href="/"><div class="logo">TECHRUM</div></a>
        <a href="/">Home</a>
        <a href="/news/news.html" class="active-link">News</a>
        <a href="/news/saved.html">Saved</a>
      </div>

      <div class="nav-center">
        <a href="/"><div class="logo mobile-logo">TECHRUM</div></a>
      </div>

      <div class="nav-right">
        <button id="themeToggle" class="theme-toggle">🌙</button>
      </div>
    </nav>
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Nguồn tin</h3>
        <button class="add-btn" onclick="openAdd()">+</button>
      </div>

      <div id="sources"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="content">
      <h2 id="pageTitle">Chọn nguồn tin</h2>

      <div class="news-grid" id="news"></div>

      <div class="pagination" id="pagination"></div>

      <div style="text-align: center">
        <button class="loadmore" onclick="loadMore()">Load More</button>
      </div>
    </div>

    <!-- MODAL -->

    <div class="modal" id="modal">
      <div class="modal-box">
        <h3 id="modalTitle">Thêm nguồn tin</h3>

        <input id="name" placeholder="Tên nguồn" />
        <input id="logo" placeholder="Logo URL" />
        <input id="url" placeholder="RSS URL" />
        <label
          style="
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
          "
        >
          <input type="checkbox" id="isBot" />
          Site bị Cloudflare bot check
        </label>

        <button onclick="saveSource()">Lưu</button>
        <button onclick="closeModal()">Hủy</button>
      </div>
    </div>

    <script>
      const API = "https://getnews.cuongnv.workers.dev";

      let sourcesData = [];
      let currentSource = null;
      let currentPage = 1;
      let totalPages = 1;
      let limit = 10;
      let editingId = null;

      // ================= MODAL =================

      function openAdd() {
        editingId = null;
        modalTitle.innerText = "Thêm nguồn tin";
        name.value = logo.value = url.value = "";
        isBot.checked = false;
        modal.style.display = "flex";
      }

      function openEdit(s) {
        editingId = s.id;
        modalTitle.innerText = "Sửa nguồn tin";
        name.value = s.name;
        logo.value = s.logo || "";
        url.value = s.url;
        isBot.checked = s.isBot || false;
        modal.style.display = "flex";
      }

      function closeModal() {
        modal.style.display = "none";
      }

      // ================= SAVE =================

      async function saveSource() {
        const payload = {
          name: document.getElementById("name").value.trim(),
          logo: document.getElementById("logo").value.trim(),
          url: document.getElementById("url").value.trim(),
          isBot: document.getElementById("isBot").checked,
        };

        if (editingId) {
          await fetch(API + "/sources/" + editingId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          await fetch(API + "/sources", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        closeModal();
        loadSources();
      }

      // ================= DELETE =================

      async function deleteSource(id) {
        if (!confirm("Xóa nguồn tin?")) return;

        await fetch(API + "/sources/" + id, { method: "DELETE" });

        if (currentSource?.id === id) {
          currentSource = null;
          news.innerHTML = "";
          pageTitle.innerText = "Chọn nguồn tin";
        }

        loadSources();
      }

      // ================= LOAD SOURCES =================

      async function loadSources() {
        const res = await fetch(API + "/sources");
        sourcesData = await res.json();

        const box = document.getElementById("sources");
        box.innerHTML = "";

        sourcesData.forEach((s) => {
          const div = document.createElement("div");
          div.className = "source";

          if (currentSource?.id === s.id) div.classList.add("active");

          div.innerHTML = `
      <div class="source-left">
        <img src="${s.logo || ""}">
        <span>${s.name} ${s.isBot ? "⭐" : ""}</span>
      </div>

      <div>
        <button onclick='event.stopPropagation(); openEdit(${JSON.stringify(s)})'>✏️</button>
        <button onclick='event.stopPropagation(); deleteSource("${s.id}")'>🗑️</button>
      </div>
    `;

          div.onclick = () => selectSource(s);

          box.appendChild(div);
        });
        if (!currentSource && sourcesData.length > 0) {
          selectSource(sourcesData[0]);
        }
      }

      // ================= SELECT SOURCE =================

      function selectSource(source) {
        currentSource = source;
        currentPage = 1;

        pageTitle.innerText = source.name;

        document
          .querySelectorAll(".source")
          .forEach((el) => el.classList.remove("active"));

        const idx = sourcesData.findIndex((s) => s.id === source.id);
        document.querySelectorAll(".source")[idx]?.classList.add("active");

        if (window.innerWidth <= 768) {
          closeSidebar();
        }

        loadNews();
      }

      // ================= LOAD NEWS =================

      async function loadNews(append = false) {
        if (!currentSource) return;

        const res = await fetch(
          `${API}/?url=${encodeURIComponent(currentSource.url)}&page=${currentPage}&limit=${limit}`,
        );

        const data = await res.json();

        if (!append) news.innerHTML = "";

        data.articles.forEach((n) => {
          const div = document.createElement("div");
          div.className = "news-item";

          div.innerHTML = `
  <img src="${n.image}">
  <h4>${n.title_vi || n.title}</h4>

  <div class="item-overlay">
    <button class="overlay-btn open-btn">🚀</button>
    <button class="overlay-btn convert-btn">🔗</button>
    <button class="overlay-btn save-btn">💾</button>
  </div>
`;

          const openBtn = div.querySelector(".open-btn");
          const convertBtn = div.querySelector(".convert-btn");
          const saveBtn = div.querySelector(".save-btn");

          openBtn.onclick = (e) => {
            e.stopPropagation();
            window.open(n.link, "_blank");
          };

          convertBtn.onclick = (e) => {
            e.stopPropagation();

            const encoded = encodeURIComponent(n.link);

            let url = `/?url=${encoded}`;

            if (currentSource?.isBot) {
              url += "&bot=1";
            }

            window.location.href = url;
          };

          saveBtn.onclick = async (e) => {
            e.stopPropagation();
            console.log(1);

            if (!currentSource) return;

            const payload = {
              title: n.title_vi || "",
              link: n.link,
              image: n.image,
              source_id: currentSource.id,
            };

            try {
              const res = await fetch(API + "/saved", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(payload),
              });

              const data = await res.json();

              if (res.ok) {
                saveBtn.innerHTML = "⭐";
                saveBtn.style.background = "#ffd700";
                alert("Đã lưu bài viết thành công");
              } else {
                alert("Lưu thất bại");
              }
            } catch (err) {
              console.error(err);
              alert("Lỗi khi lưu");
            }
          };

          news.appendChild(div);
        });

        totalPages = Math.ceil(data.total / limit);

        renderPagination();
      }

      // ================= PAGINATION =================

      function renderPagination() {
        const box = document.getElementById("pagination");
        box.innerHTML = "";

        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.innerText = i;

          if (i === currentPage) btn.style.fontWeight = "bold";

          btn.onclick = () => {
            currentPage = i;
            loadNews();
          };

          box.appendChild(btn);
        }
      }

      // ================= LOAD MORE =================

      function loadMore() {
        if (currentPage < totalPages) {
          currentPage++;
          loadNews(true);
        }
      }

      // ================= INIT =================

      loadSources();

      const menuBtn = document.getElementById("menuBtn");

      menuBtn.addEventListener("click", () => {
        document.querySelector(".sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
      });

      function closeSidebar() {
        document.querySelector(".sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
      }

      function checkMobile() {
        if (window.innerWidth <= 768) {
          menuBtn.style.display = "inline-block";
        } else {
          menuBtn.style.display = "none";
          document.querySelector(".sidebar").classList.remove("open");
        }
      }

      window.addEventListener("resize", checkMobile);
      checkMobile();

      const themeToggle = document.getElementById("themeToggle");

      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        themeToggle.textContent = "☀️";
      }

      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        const isDark = document.body.classList.contains("dark");

        localStorage.setItem("theme", isDark ? "dark" : "light");

        themeToggle.textContent = isDark ? "☀️" : "🌙";
      });
    </script>
  </body>
</html>
