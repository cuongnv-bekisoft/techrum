<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Aggregator</title>
    <link rel="stylesheet" href="../main.css" />

    <style>
      body {
        margin: 0;
        font-family: Arial;
        display: flex;
        height: 100vh;
        background: var(--bg);
        color: var(--text);
        transition: 0.3s;
        padding-top: 60px;
      }

      button {
        background: var(--button);
        color: white;
        border: 1px solid var(--text);
        cursor: pointer;
        font-weight: bold;
        border-radius: 5px;
      }

      button:hover {
        background: var(--button-hover);
      }

      /* ================= SIDEBAR ================= */

      .sidebar {
        width: 260px;
        overflow-y: auto;
        padding: 10px;
        background: var(--card);
        border-right: 1px solid var(--border);
        transition: 0.3s;
      }

      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .add-btn {
        font-size: 22px;
        cursor: pointer;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
      }

      .source {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
      }

      .source:hover {
        background: var(--hover);
      }
      .source.active {
        background: var(--border);
      }

      .source-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .source img {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }

      .source span {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      /* ================= CONTENT ================= */

      .content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
      }

      /* ================= MODAL ================= */

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal-box {
        background: var(--card);
        padding: 20px;
        border-radius: 8px;
        width: 100%;
        max-width: 400px;
      }

      .modal input {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        z-index: 999;
      }

      .overlay.show {
        display: block;
      }

      /* ================= MOBILE ================= */

      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .navbar {
          max-width: 92%;
        }

        .sidebar {
          position: fixed;
          left: -300px;
          top: 0;
          height: 100%;
          z-index: 1000;
          box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar.open {
          left: 0;
        }

        .content {
          padding: 15px;
        }

        .menu-btn {
          display: block;
          background: #0070f3;
          color: white;
          border: none;
          padding: 6px 10px;
          border-radius: 6px;
        }

        body {
          padding-top: 40px;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">
        <button id="menuBtn" class="menu-btn">☰</button>
        <a href="/"><div class="logo">TECHRUM</div></a>
        <a href="/">Home</a>
        <a href="/news/news.html" class="active-link">News</a>
        <a href="/news/saved.html">Saved</a>
        <a href="/news/ios.html">iOS</a>
      </div>

      <div class="nav-center">
        <a href="/"><div class="logo mobile-logo">TECHRUM</div></a>
      </div>

      <div class="nav-right">
        <button id="themeToggle" class="theme-toggle is-pc">🌙</button>

        <button
          id="menuBtnRight"
          class="menu-btn"
          onclick="toggleRightSidebar()"
        >
          ☰
        </button>
      </div>
    </nav>
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Nguồn tin</h3>
        <button class="add-btn" onclick="openAdd()">+</button>
      </div>

      <div id="sources"></div>
    </div>

    <div id="sidebarRight" class="sidebar-right">
      <a href="/">🏠 Home</a>
      <a href="/news/news.html">📰 News</a>
      <a href="/news/saved.html">💾 Saved</a>
      <a href="/news/ios.html">🍎 iOS</a>
      <a id="themeToggle">🌙Dark mode</a>
    </div>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="content">
      <h2 id="pageTitle">Chọn nguồn tin</h2>

      <div class="news-grid" id="news"></div>

      <div class="pagination" id="pagination"></div>

      <div class="loadmore-wrap">
        <button id="loadmoreBtn" class="loadmore" onclick="loadMore()">
          Load More
        </button>
      </div>
    </div>

    <!-- MODAL -->

    <div class="modal" id="modal">
      <div class="modal-box">
        <h3 id="modalTitle">Thêm nguồn tin</h3>

        <input id="name" placeholder="Tên nguồn" />
        <input id="logo" placeholder="Logo URL" />
        <input id="url" placeholder="RSS URL" />
        <label
          style="
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
          "
        >
          <input type="checkbox" id="isBot" />
          Site bị Cloudflare bot check
        </label>

        <button onclick="saveSource()">Lưu</button>
        <button onclick="closeModal()">Hủy</button>
      </div>
    </div>

    <script>
      const API = "https://getnews.cuongnv.workers.dev";

      let sourcesData = [];
      let currentSource = null;
      let currentPage = 1;
      let totalPages = 1;
      let limit = 10;
      let editingId = null;

      // ================= MODAL =================

      function openAdd() {
        editingId = null;
        modalTitle.innerText = "Thêm nguồn tin";
        name.value = logo.value = url.value = "";
        isBot.checked = false;
        modal.style.display = "flex";
      }

      function openEdit(s) {
        editingId = s.id;
        modalTitle.innerText = "Sửa nguồn tin";
        name.value = s.name;
        logo.value = s.logo || "";
        url.value = s.url;
        isBot.checked = s.isBot || false;
        modal.style.display = "flex";
      }

      function closeModal() {
        modal.style.display = "none";
      }

      // ================= SAVE =================

      async function saveSource() {
        const payload = {
          name: document.getElementById("name").value.trim(),
          logo: document.getElementById("logo").value.trim(),
          url: document.getElementById("url").value.trim(),
          isBot: document.getElementById("isBot").checked,
        };

        if (editingId) {
          await fetch(API + "/sources/" + editingId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          await fetch(API + "/sources", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        closeModal();
        loadSources();
      }

      // ================= DELETE =================

      async function deleteSource(id) {
        if (!confirm("Xóa nguồn tin?")) return;

        await fetch(API + "/sources/" + id, { method: "DELETE" });

        if (currentSource?.id === id) {
          currentSource = null;
          news.innerHTML = "";
          pageTitle.innerText = "Chọn nguồn tin";
        }

        loadSources();
      }

      // ================= LOAD SOURCES =================

      async function loadSources() {
        const res = await fetch(API + "/sources");
        sourcesData = await res.json();

        const box = document.getElementById("sources");
        box.innerHTML = "";

        sourcesData.forEach((s) => {
          const div = document.createElement("div");
          div.className = "source";

          if (currentSource?.id === s.id) div.classList.add("active");

          div.innerHTML = `
      <div class="source-left">
        <img src="${s.logo || ""}">
        <span>${s.name} ${s.isBot ? "⭐" : ""}</span>
      </div>

      <div>
        <button onclick='event.stopPropagation(); openEdit(${JSON.stringify(s)})'>✏️</button>
        <button onclick='event.stopPropagation(); deleteSource("${s.id}")'>🗑️</button>
      </div>
    `;

          div.onclick = () => selectSource(s);

          box.appendChild(div);
        });
        if (!currentSource && sourcesData.length > 0) {
          selectSource(sourcesData[0]);
        }
      }

      // ================= SELECT SOURCE =================

      function selectSource(source) {
        currentSource = source;
        currentPage = 1;

        pageTitle.innerText = source.name;

        scrollTopMobile();

        document
          .querySelectorAll(".source")
          .forEach((el) => el.classList.remove("active"));

        const idx = sourcesData.findIndex((s) => s.id === source.id);
        document.querySelectorAll(".source")[idx]?.classList.add("active");

        if (window.innerWidth <= 768) {
          closeSidebar();
        }

        loadNews();
      }

      // ================= LOAD NEWS =================

      async function loadNews(append = false) {
        if (!currentSource) return;

        const res = await fetch(
          `${API}/?url=${encodeURIComponent(currentSource.url)}&page=${currentPage}&limit=${limit}`,
        );

        const data = await res.json();

        if (!append) news.innerHTML = "";

        data.articles.forEach((n) => {
          const div = document.createElement("div");
          div.className = "news-item";

          div.innerHTML = `
  <img src="${n.image}">
  <h4>${n.title_vi || n.title}</h4>

  <div class="item-overlay">
    <button class="overlay-btn open-btn">🚀</button>
    <button class="overlay-btn convert-btn">🔗</button>
    <button class="overlay-btn save-btn">💾</button>
  </div>
`;

          const openBtn = div.querySelector(".open-btn");
          const convertBtn = div.querySelector(".convert-btn");
          const saveBtn = div.querySelector(".save-btn");

          openBtn.onclick = (e) => {
            e.stopPropagation();
            window.open(n.link, "_blank");
          };

          convertBtn.onclick = (e) => {
            e.stopPropagation();

            const encoded = encodeURIComponent(n.link);

            let url = `/?url=${encoded}`;

            if (currentSource?.isBot) {
              url += "&bot=1";
            }

            window.open(url, "_blank");
          };

          saveBtn.onclick = async (e) => {
            e.stopPropagation();
            console.log(1);

            if (!currentSource) return;

            const payload = {
              title: n.title_vi || "",
              link: n.link,
              image: n.image,
              source_id: currentSource.id,
            };

            try {
              const res = await fetch(API + "/saved", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(payload),
              });

              const data = await res.json();

              if (res.ok) {
                saveBtn.innerHTML = "⭐";
                saveBtn.style.background = "#ffd700";
                alert("Đã lưu bài viết thành công");
              } else {
                alert("Bài này đã từng lưu rồi!");
              }
            } catch (err) {
              console.error(err);
              alert("Lỗi khi lưu");
            }
          };

          news.appendChild(div);
        });

        totalPages = Math.ceil(data.total / limit);

        renderPagination();
      }

      // ================= PAGINATION =================

      function renderPagination() {
        const box = document.getElementById("pagination");
        box.innerHTML = "";

        function createBtn(label, page, disabled = false, active = false) {
          const btn = document.createElement("button");
          btn.innerText = label;

          if (active) btn.classList.add("active");
          if (disabled) btn.classList.add("disabled");

          btn.onclick = () => {
            currentPage = page;
            scrollTopMobile();
            loadNews();
          };

          box.appendChild(btn);
        }

        // Prev
        createBtn("←", currentPage - 1, currentPage === 1);

        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, currentPage + 2);

        if (start > 1) {
          createBtn(1, 1);
          if (start > 2) {
            const dots = document.createElement("span");
            dots.innerText = "...";
            box.appendChild(dots);
          }
        }

        for (let i = start; i <= end; i++) {
          createBtn(i, i, false, i === currentPage);
        }

        if (end < totalPages) {
          if (end < totalPages - 1) {
            const dots = document.createElement("span");
            dots.innerText = "...";
            box.appendChild(dots);
          }
          createBtn(totalPages, totalPages);
        }

        // Next
        createBtn("→", currentPage + 1, currentPage === totalPages);
      }

      // ================= LOAD MORE =================

      function loadMore() {
        if (currentPage >= totalPages) return;

        currentPage++;

        loadNews(true).then(() => {
          scrollToPageStart(currentPage);
        });
      }

      // ================= INIT =================

      loadSources();

      const menuBtn = document.getElementById("menuBtn");

      menuBtn.addEventListener("click", () => {
        document.querySelector(".sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
      });

      function closeSidebar() {
        document.querySelector(".sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
      }

      function checkMobile() {
        if (window.innerWidth <= 768) {
          menuBtn.style.display = "inline-block";
        } else {
          menuBtn.style.display = "none";
          document.querySelector(".sidebar").classList.remove("open");
        }
      }

      window.addEventListener("resize", checkMobile);
      checkMobile();

      const themeToggle = document.getElementById("themeToggle");

      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        themeToggle.textContent = "☀️";
      }

      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        const isDark = document.body.classList.contains("dark");

        localStorage.setItem("theme", isDark ? "dark" : "light");

        themeToggle.textContent = isDark ? "☀️" : "🌙";
      });

      function toggleRightSidebar() {
        const sidebar = document.getElementById("sidebarRight");
        const overlay = document.getElementById("overlay");

        sidebar.classList.toggle("open");
        overlay.classList.toggle("show");
      }

      function closeSidebar() {
        document.querySelector(".sidebar").classList.remove("open");

        document.getElementById("sidebarRight").classList.remove("open");

        document.getElementById("overlay").classList.remove("show");
      }

      function scrollTopMobile() {
        if (window.innerWidth <= 768) {
          document.querySelector(".content").scrollTo({
            top: 0,
            behavior: "smooth",
          });
        }
      }
      function scrollToPageStart(page) {
        const items = document.querySelectorAll(".news-item");

        const index = (page - 1) * limit;

        if (items[index]) {
          items[index].scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        }
      }
    </script>
  </body>
</html>
