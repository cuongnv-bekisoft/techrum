<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Aggregator</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar {
  width:260px;
  border-right:1px solid #ddd;
  overflow-y:auto;
  padding:10px;
  background:#fafafa;
  transition:0.3s;
}

.sidebar-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.add-btn {
  font-size:22px;
  cursor:pointer;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
}

.source {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.source:hover { background:#eee; }
.source.active { background:#ddd; }

.source-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.source img {
  width:30px;
  height:30px;
  object-fit:contain;
}

/* ================= CONTENT ================= */

.content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.news-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:16px;
}

.news-item {
  border:1px solid #ddd;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.news-item:hover {
  transform:translateY(-3px);
}

.news-item img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.news-item h4 {
  margin:8px;
  font-size:14px;
}

.pagination {
  text-align:center;
  margin-top:20px;
}

.loadmore {
  margin-top:10px;
}

/* ================= MODAL ================= */

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:8px;
  width:100%;
  max-width:400px;
}

.modal input {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:999;
}

.overlay.show{
  display:block;
}

/* ================= TABLET ================= */

@media (max-width:1024px){
  .sidebar{
    width:200px;
  }

  .news-grid{
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  }
}

/* ================= MOBILE ================= */

@media (max-width:768px){

  body{
    flex-direction:column;
  }

  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100%;
    z-index:1000;
    box-shadow:2px 0 10px rgba(0,0,0,.2);
  }

  .sidebar.open{
    left:0;
  }

  .content{
    padding:15px;
  }

  .news-grid{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<div class="sidebar">

  <div class="sidebar-header">
    <h3>Nguồn tin</h3>
    <button class="add-btn" onclick="openAdd()">+</button>
  </div>

  <div id="sources"></div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="content">
  <button onclick="toggleSidebar()" 
        style="margin-bottom:10px;display:none"
        id="menuBtn">☰ Menu</button>

  <h2 id="pageTitle">Chọn nguồn tin</h2>

  <div class="news-grid" id="news"></div>

  <div class="pagination" id="pagination"></div>

  <div style="text-align:center">
    <button class="loadmore" onclick="loadMore()">Load More</button>
  </div>
</div>

<!-- MODAL -->

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Thêm nguồn tin</h3>

    <input id="name" placeholder="Tên nguồn">
    <input id="logo" placeholder="Logo URL">
    <input id="url" placeholder="RSS URL">

    <button onclick="saveSource()">Lưu</button>
    <button onclick="closeModal()">Hủy</button>
  </div>
</div>

<script>
const API = "https://getnews.cuongnv.workers.dev";

let sourcesData = [];
let currentSource = null;
let currentPage = 1;
let totalPages = 1;
let limit = 10;
let editingId = null;

// ================= MODAL =================

function openAdd(){
  editingId = null;
  modalTitle.innerText="Thêm nguồn tin";
  name.value = logo.value = url.value = "";
  modal.style.display="flex";
}

function openEdit(s){
  editingId = s.id;
  modalTitle.innerText="Sửa nguồn tin";
  name.value = s.name;
  logo.value = s.logo || "";
  url.value = s.url;
  modal.style.display="flex";
}

function closeModal(){ modal.style.display="none"; }

// ================= SAVE =================

async function saveSource(){

  const payload = {
    name: document.getElementById("name").value.trim(),
    logo: document.getElementById("logo").value.trim(),
    url:  document.getElementById("url").value.trim()
  };

  if(editingId){
    await fetch(API+"/sources/"+editingId,{
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(payload)
    });
  }else{
    await fetch(API+"/sources",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(payload)
    });
  }

  closeModal();
  loadSources();
}

// ================= DELETE =================

async function deleteSource(id){

  if(!confirm("Xóa nguồn tin?")) return;

  await fetch(API+"/sources/"+id,{ method:"DELETE" });

  if(currentSource?.id === id){
    currentSource = null;
    news.innerHTML="";
    pageTitle.innerText="Chọn nguồn tin";
  }

  loadSources();
}

// ================= LOAD SOURCES =================

async function loadSources(){

  const res = await fetch(API+"/sources");
  sourcesData = await res.json();

  const box = document.getElementById("sources");
  box.innerHTML="";

  sourcesData.forEach(s=>{

    const div = document.createElement("div");
    div.className="source";

    if(currentSource?.id === s.id)
      div.classList.add("active");

    div.innerHTML=`
      <div class="source-left">
        <img src="${s.logo||''}">
        <span>${s.name}</span>
      </div>

      <div>
        <button onclick='event.stopPropagation(); openEdit(${JSON.stringify(s)})'>✏️</button>
        <button onclick='event.stopPropagation(); deleteSource("${s.id}")'>🗑️</button>
      </div>
    `;

    div.onclick = ()=> selectSource(s);

    box.appendChild(div);
  });
  if (!currentSource && sourcesData.length > 0) {
  selectSource(sourcesData[0]);
}
}

// ================= SELECT SOURCE =================

function selectSource(source){

  currentSource = source;
  currentPage = 1;

  pageTitle.innerText = source.name;

  document.querySelectorAll(".source")
    .forEach(el=>el.classList.remove("active"));

  const idx = sourcesData.findIndex(s=>s.id===source.id);
  document.querySelectorAll(".source")[idx]
    ?.classList.add("active");

  if(window.innerWidth <= 768){
  closeSidebar();
}

  loadNews();
}

// ================= LOAD NEWS =================

async function loadNews(append=false){

  if(!currentSource) return;

  const res = await fetch(
    `${API}/?url=${encodeURIComponent(currentSource.url)}&page=${currentPage}&limit=${limit}`
  );

  const data = await res.json();

  if(!append) news.innerHTML="";

  data.articles.forEach(n=>{

    const div = document.createElement("div");
    div.className="news-item";

    div.innerHTML=`
      <img src="${n.image}">
      <h4>${n.title_vi || n.title}</h4>
    `;

    div.onclick = ()=> window.open(n.link,"_blank");

    news.appendChild(div);
  });

  totalPages = Math.ceil(data.total / limit);

  renderPagination();
}

// ================= PAGINATION =================

function renderPagination() {

  const box = document.getElementById("pagination");
  box.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {

    const btn = document.createElement("button");
    btn.innerText = i;

    if (i === currentPage)
      btn.style.fontWeight = "bold";

    btn.onclick = () => {
      currentPage = i;
      loadNews();
    };

    box.appendChild(btn);
  }
}

// ================= LOAD MORE =================

function loadMore(){
  if(currentPage < totalPages){
    currentPage++;
    loadNews(true);
  }
}

// ================= INIT =================

loadSources();

function toggleSidebar(){
  const sidebar = document.querySelector(".sidebar");
  const overlay = document.getElementById("overlay");

  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function closeSidebar(){
  document.querySelector(".sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

function checkMobile(){
  if(window.innerWidth <= 768){
    menuBtn.style.display = "inline-block";
  }else{
    menuBtn.style.display = "none";
    document.querySelector(".sidebar").classList.remove("open");
  }
}

window.addEventListener("resize", checkMobile);
checkMobile();
</script>

</body>
</html>
