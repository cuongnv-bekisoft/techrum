<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techrum Image Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f7aff;
    --accent2: #7c3aed;
    --text: #e8eaf6;
    --text2: #8b92b8;
    --radius: 14px;
  }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 32px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4f7aff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ---- Layout ---- */
  .layout {
    display: flex;
    flex-direction: row;
    gap: 32px;
    width: 100%;
    max-width: 1100px;
    align-items: flex-start;
  }

  @media (max-width: 767px) {
    body { padding: 20px 16px; gap: 20px; }
    h1 { font-size: 18px; }
    .layout { flex-direction: column; gap: 20px; }
    .preview-wrap { width: 100% !important; }
    .panel { width: 100% !important; }
    /* iOS hay bị cắt phần tử khi chiều cao thay đổi theo nội dung */
    .canvas-outer { overflow: visible; }
  }

  /* ---- Panel trái ---- */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 320px;
    flex-shrink: 0;
  }

  .panel h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text2);
  }

  label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; }
  .field { display: flex; flex-direction: column; }

  .hint {
    font-size: 12px;
    color: var(--text2);
    margin-top: 7px;
    line-height: 1.5;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid #ef4444;
  }
  .hint code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 11px;
    color: #fca5a5;
  }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: rgba(79,122,255,.05); }
  .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .dropzone-icon { font-size: 26px; margin-bottom: 8px; }
  .dropzone p { font-size: 13px; color: var(--text2); }
  .dropzone p span { color: var(--accent); font-weight: 600; }
  #preview-thumb { width: 100%; max-height: 100px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; }

  textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 80px;
    transition: border-color .2s;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--text2); }

  .btn-group { display: flex; gap: 10px; margin-top: 4px; }

  button {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .2s, transform .1s;
    -webkit-appearance: none;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* ---- Preview ---- */
  .preview-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }
  .preview-label { font-size: 13px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

  .canvas-outer {
    width: 100%;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
  }

  /* ---- Composer ---- */
  #composer {
    width: 100%;
    display: block;
    position: relative;
    background: #fff;
    font-size: 0; /* remove inline-block gap */
  }

  /* Ảnh nền: full width, tự cao theo tỉ lệ */
  #base-img {
    width: 100%;
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  /* Overlay nằm trên ảnh nền, cùng chiều rộng */
  #overlay {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Logo placeholder — cao đúng bằng phần logo trên ảnh nền
     Logo 45px / tổng 712px = 6.32% chiều cao ảnh nền
     Vì overlay cùng width với ảnh nền (1016px), padding-top tính theo width:
     45px / 1016px = 4.43% */
  #logo-placeholder {
    width: 100%;
    padding-top: 4.43%;
    flex-shrink: 0;
  }

  /* Ảnh nội dung full width */
  #content-img {
    width: 100%;
    display: none;
    flex-shrink: 0;
    /* Không ép/cắt nội dung ảnh khi chữ dài; để layout tự giãn theo nội dung */
    object-fit: contain;
  }

  /* Text cách ảnh nội dung 15px, cách mép dưới 15px */
  #text-wrap {
    width: 100%;
    padding: 15px 5% 15px;
  }

  #disp-text {
    font-family: 'Be Vietnam Pro', Arial, sans-serif;
    font-weight: 700;
    color: #007bff;
    text-align: center;
    line-height: 1.8;
    width: 100%;
    word-break: break-word;
    /* font-size set bằng JS */
  }

  #disp-text .hl { color: #ef4444; }

  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #22c55e;
    color: #fff;
    padding: 10px 22px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<h1>Techrum Image Builder</h1>

<div class="layout">

  <!-- Panel trái -->
  <div class="panel">
    <h2>Cài đặt</h2>

    <div class="field">
      <label>Ảnh nội dung</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="img-input" accept="image/*">
        <div class="dropzone-icon">🖼️</div>
        <p><span>Chọn ảnh</span> hoặc kéo thả vào đây</p>
        <img id="preview-thumb" alt="preview">
      </div>
    </div>

    <div class="field">
      <label>Nội dung</label>
      <textarea id="content-text" placeholder="(Windows) *Đang miễn phí* tựa game bắn Zombie trị giá 50.000 VNĐ"></textarea>
      <div class="hint">
        Bọc chữ trong <code>*...*</code> để highlight <span style="color:#ef4444;font-weight:600">đỏ</span><br>
        VD: <code>(Windows) *Đang miễn phí* tựa game</code>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn-primary" id="btn-download" disabled>⬇ Tải về</button>
      <button class="btn-secondary" id="btn-copy" disabled>📋 Copy</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-wrap">
    <div class="preview-label">Xem trước</div>
    <div class="canvas-outer">
      <div id="composer">
        <!-- Ảnh nền — dùng <img> thay vì background-image để Safari render đúng -->
        <img id="base-img"
          src="https://res.cloudinary.com/dfe28hybo/image/upload/v1775188309/techrum_bg.png"
          crossorigin="anonymous" alt="base"
          onload="syncComposerHeight()">

        <!-- Overlay -->
        <div id="overlay">
          <div id="logo-placeholder"></div>
          <img id="content-img" alt="content" crossorigin="anonymous">
          <div id="text-wrap">
            <div id="disp-text"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  const imgInput    = document.getElementById('img-input');
  const dropzone    = document.getElementById('dropzone');
  const thumb       = document.getElementById('preview-thumb');
  const contentText = document.getElementById('content-text');
  const dispText    = document.getElementById('disp-text');
  const contentImg  = document.getElementById('content-img');
  const btnDL       = document.getElementById('btn-download');
  const btnCopy     = document.getElementById('btn-copy');
  const composer    = document.getElementById('composer');
  const baseImg     = document.getElementById('base-img');

  let hasImage = false;
  let currentObjectUrl = null;

  function resetUI() {
    // Xóa nội dung nhập
    contentText.value = '';
    dispText.innerHTML = '';

    // Xóa ảnh nội dung
    if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
    currentObjectUrl = null;

    // Reset file input để chọn lại cùng 1 file vẫn trigger được 'change'
    imgInput.value = '';

    thumb.src = '';
    thumb.style.display = 'none';

    contentImg.src = '';
    contentImg.style.display = 'none';

    hasImage = false;
    updateButtons();
  }

  // Sync chiều cao composer = chiều cao ảnh nền để overlay khớp
  function syncComposerHeight() {
    // Không khóa cứng chiều cao để khi chữ dài hơn thì ảnh xuất ra vẫn giãn theo nội dung
    composer.style.height = 'auto';
    composer.style.minHeight = baseImg.offsetHeight + 'px';
    updateFontSize();
  }

  // Font size tỉ lệ theo chiều rộng composer
  function updateFontSize() {
    const w = composer.offsetWidth;
    const size = Math.min(34, Math.max(12, w * 0.034));
    dispText.style.fontSize = size + 'px';
  }

  // Sync lại khi resize
  window.addEventListener('resize', syncComposerHeight);
  if (baseImg.complete) syncComposerHeight();

  // Preview đôi khi render trước khi font Google load xong (đặc biệt iOS),
  // khiến ngắt dòng/chiều cao khác export. Chờ font rồi sync lại layout.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      updateFontSize();
    });
  }

  // Safari iOS có thể khôi phục trang từ cache (bfcache) khiến nội dung nhập vẫn còn.
  // Reset để mở lại trang luôn sạch.
  resetUI();
  setTimeout(resetUI, 50);
  window.addEventListener('pageshow', (e) => {
    if (e && e.persisted) {
      resetUI();
      setTimeout(resetUI, 50);
    }
  });

  // Parse *text* → <span class="hl">
  function parseHighlight(raw) {
    const escaped = raw
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    return escaped.replace(/\*([^*]+)\*/g, '<span class="hl">$1</span>');
  }

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
  });
  imgInput.addEventListener('change', () => {
    if (imgInput.files[0]) loadImage(imgInput.files[0]);
  });

  function loadImage(file) {
    const url = URL.createObjectURL(file);
    currentObjectUrl = url;
    thumb.src = url;
    thumb.style.display = 'block';
    contentImg.src = url;
    contentImg.style.display = 'block';
    hasImage = true;
    updateButtons();
    // Sau khi ảnh nội dung load xong thì sync lại height
    contentImg.onload = syncComposerHeight;
  }

  contentText.addEventListener('input', () => {
    dispText.innerHTML = parseHighlight(contentText.value);
    updateButtons();
  });

  function updateButtons() {
    btnDL.disabled = !hasImage;
    btnCopy.disabled = !hasImage;
  }

  async function render() {
    // Đảm bảo ảnh nền load xong
    await new Promise(r => { if (baseImg.complete) r(); else baseImg.onload = r; });
    syncComposerHeight();

    // Xuất theo kích thước gốc của nền để bố cục (ngắt dòng) giống PC.
    const exportW = baseImg.naturalWidth || composer.offsetWidth;
    const exportH = baseImg.naturalHeight || baseImg.offsetHeight;

    // iOS đôi khi cần đợi font tải xong để tránh khác line-break.
    if (document.fonts && document.fonts.ready) await document.fonts.ready;

    // Clone để không làm "giật" preview và không bị wrapper overflow cắt.
    const clone = composer.cloneNode(true);
    clone.style.position = 'absolute';
    clone.style.left = '-100000px';
    clone.style.top = '0';
    clone.style.width = exportW + 'px';
    clone.style.height = 'auto';
    clone.style.minHeight = exportH + 'px';
    clone.style.overflow = 'visible';

    // Đồng bộ font-size theo width clone (giống updateFontSize nhưng áp dụng cho clone).
    const cloneDispText = clone.querySelector('#disp-text');
    if (cloneDispText) {
      const size = Math.min(34, Math.max(12, exportW * 0.034));
      cloneDispText.style.fontSize = size + 'px';
    }

    document.body.appendChild(clone);

    await new Promise(r => requestAnimationFrame(r));
    await new Promise(r => requestAnimationFrame(r));

    const canvas = await html2canvas(clone, {
      useCORS: true,
      allowTaint: false,
      scale: 2,
      backgroundColor: '#ffffff',
    });

    clone.remove();
    return canvas;
  }

  btnDL.addEventListener('click', async () => {
    btnDL.disabled = true;
    btnDL.textContent = 'Đang xử lý...';
    try {
      const canvas = await render();
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `techrum_${Date.now()}.png`;
      a.click();
      showToast('✅ Đã tải về!');
    } catch(e) { showToast('❌ Lỗi: ' + e.message); }
    btnDL.disabled = false;
    btnDL.textContent = '⬇ Tải về';
  });

  btnCopy.addEventListener('click', async () => {
    btnCopy.disabled = true;
    btnCopy.textContent = 'Đang xử lý...';
    try {
      const canvas = await render();
      canvas.toBlob(async blob => {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('✅ Đã copy vào clipboard!');
        btnCopy.disabled = false;
        btnCopy.textContent = '📋 Copy';
      }, 'image/png');
    } catch(e) {
      showToast('❌ ' + e.message);
      btnCopy.disabled = false;
      btnCopy.textContent = '📋 Copy';
    }
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
